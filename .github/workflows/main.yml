name: Build Gauguin Kernel (DtHnAme complete source, clean/stock)

# 纯净编译，不集成KernelSU、不打任何patch，先确认这个能编译过、
# 刷进去能正常开机，再考虑后面叠加KSU的事
#
# 源码换成 DtHnAme/kernel_xiaomi_gauguin (11.0-oss分支)：
# - 内核版本字符串里的编译者签名(dthname@archlinux, clang 12.0.0,
#   2021-06-23)跟这个GitHub账号对得上，这份源码大概率就是实际在跑的
#   移植系统内核的真实来源
# - 已核实这份仓库自带完整的 arch/arm64/boot/dts/vendor/ 设备树和
#   nt36xxx触摸驱动，不像官方Xiaomi_Kernel_OpenSource那样缺失
# - 关键点：gauguin-sm6350.dtb在这份源码里是挂在CONFIG_ARCH_LAGOON下面
#   (不是CONFIG_ARCH_LITO)，这份仓库自己的defconfig两个都开了，跟官方
#   defconfig对不上——这也是之前拼官方源码那条路一直卡住的原因之一

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bison flex libssl-dev bc libncurses-dev \
            build-essential libelf-dev rsync ccache

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-gauguin-dthname-${{ github.run_id }}
          restore-keys: |
            ccache-gauguin-dthname-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache --set-config=cache_dir=$HOME/.ccache
          ccache -z

      - name: Checkout kernel source (DtHnAme, 11.0-oss)
        run: |
          git clone --depth 1 --branch 11.0-oss \
            https://github.com/DtHnAme/kernel_xiaomi_gauguin.git kernel

      - name: Download AOSP Clang r416183b toolchain
        run: |
          git clone --depth 1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git toolchain/clang11
          toolchain/clang11/bin/clang --version

      - name: Download matching AOSP GCC 4.9 toolchain
        run: |
          git clone --depth 1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchain/gcc49

      # 以下几个修复都是工具链/构建环境层面的坑，跟具体用哪份源码无关，
      # 之前在官方源码上验证过，这里原样保留
      - name: Fix python2 syntax in scripts/gcc-wrapper.py
        run: |
          cd kernel
          if [ -f scripts/gcc-wrapper.py ]; then
            sed -i \
              -e 's/print "error, forbidden warning:", m.group(2)/print("error, forbidden warning:", m.group(2))/' \
              -e "s/print line,/print(line, end='')/" \
              -e "s/print args\[0\] + ':',e.strerror/print(args[0] + ':', e.strerror)/" \
              -e "s/print 'Is your PATH set correctly?'/print('Is your PATH set correctly?')/" \
              -e "s/print ' '.join(args), str(e)/print(' '.join(args), str(e))/" \
              -e '1s/python2/python3/' \
              scripts/gcc-wrapper.py
          fi

      - name: Fix GCC_TOOLCHAIN_DIR prefix for Clang cross compilation
        run: |
          cd kernel
          sed -i 's|CLANG_FLAGS\t+= --prefix=$(GCC_TOOLCHAIN_DIR)$|CLANG_FLAGS\t+= --prefix=$(GCC_TOOLCHAIN_DIR)$(notdir $(CROSS_COMPILE))|' Makefile
          grep -n "prefix=\$(GCC_TOOLCHAIN_DIR)" Makefile

      - name: Fix GSI symbol CRC versioning for lld compatibility
        run: |
          cd kernel
          if grep -q "if (is_crc) {" scripts/mod/modpost.c; then
            sed -i 's/if (is_crc) {/if (is_crc \&\& strcmp(symname + strlen("__crc_"), "gsi_write_channel_scratch")) {/' scripts/mod/modpost.c
            grep -n "gsi_write_channel_scratch" scripts/mod/modpost.c
          else
            echo "is_crc写法跟预期不一样，这份源码可能已经自带处理，跳过"
          fi

      - name: Implement stpcpy for Clang 12 libcall optimization
        run: |
          cd kernel
          python3 - << 'EOF'
          path = "lib/string.c"
          with open(path) as f:
              content = f.read()
          if "char *stpcpy" in content:
              print("stpcpy已经存在，跳过")
          else:
              stub = ("char *stpcpy(char *__restrict__ dest, const char *__restrict__ src);\n"
                      "char *stpcpy(char *__restrict__ dest, const char *__restrict__ src)\n"
                      "{\n"
                      "\twhile ((*dest++ = *src++) != '\\0')\n"
                      "\t\t/* nothing */;\n"
                      "\treturn --dest;\n"
                      "}\n"
                      "EXPORT_SYMBOL(stpcpy);\n"
                      "\n")
              anchor = "#ifndef __HAVE_ARCH_STRCAT"
              assert anchor in content, "anchor not found, need manual check"
              content = content.replace(anchor, stub + anchor, 1)
              with open(path, "w") as f:
                  f.write(content)
              print("stpcpy inserted")
          EOF

      - name: Fix duplicate disp_rdump_memory label in xiaomi-sm6350-common.dtsi
        run: |
          cd kernel
          F=arch/arm64/boot/dts/vendor/qcom/xiaomi-sm6350-common.dtsi
          # lito.dtsi(通用平台层)和这份小米定制层都定义了同一个标签
          # disp_rdump_memory，仓库里bengal/scuba那些机型的override文件
          # 都是先/delete-node/删掉旧的再重新定义，唯独这个文件漏了，
          # 照着同样的写法补上
          python3 - << 'EOF'
          path = "arch/arm64/boot/dts/vendor/qcom/xiaomi-sm6350-common.dtsi"
          with open(path) as f:
              content = f.read()
          anchor = "&reserved_memory {\n\tdisp_rdump_memory: disp_rdump_region@ac000000 {"
          if anchor not in content:
              raise SystemExit("anchor not found, need manual check")
          if "/delete-node/ &disp_rdump_memory;" in content:
              print("已经修过，跳过")
          else:
              content = content.replace(anchor, "/delete-node/ &disp_rdump_memory;\n\n" + anchor, 1)
              with open(path, "w") as f:
                  f.write(content)
              print("duplicate label 修复完成")
          EOF

      - name: Generate defconfig (this repo's own, untouched)
        run: |
          cd kernel
          export PATH="$PATH:$GITHUB_WORKSPACE/toolchain/clang11/bin:$GITHUB_WORKSPACE/toolchain/gcc49/bin"
          make O=out ARCH=arm64 PYTHON=python3 CC="ccache clang" CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- HOSTCFLAGS=-fcommon gauguin_user_defconfig
          grep "CONFIG_ARCH_LITO\|CONFIG_ARCH_LAGOON" out/.config

      # 只点名build Image和gauguin-sm6350.dtb这一个具体文件，不用broad的
      # dtbs/Image-dtb target——CONFIG_ARCH_LAGOON底下还挂着好几个lagoon
      # 自己的变体(lagoon-rumi/lagoon-mtp/lagoon-cdp...)，broad target
      # 会把它们也一起编，其中任何一个有问题都会拖累整个编译，之前在
      # Dhollmen源码上就撞过一次这个坑。精确点名只编我们要的这一个
      - name: Build kernel Image and gauguin-sm6350.dtb specifically
        run: |
          cd kernel
          export PATH="$PATH:$GITHUB_WORKSPACE/toolchain/clang11/bin:$GITHUB_WORKSPACE/toolchain/gcc49/bin"
          make -j$(nproc) O=out \
            ARCH=arm64 PYTHON=python3 CC="ccache clang" \
            CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- \
            HOSTCFLAGS=-fcommon KCFLAGS="-gdwarf-4 -Wno-error" \
            Image 2>&1 | tee build.log
          make -j$(nproc) O=out \
            ARCH=arm64 PYTHON=python3 CC="ccache clang" \
            CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- \
            HOSTCFLAGS=-fcommon KCFLAGS="-gdwarf-4 -Wno-error" \
            vendor/qcom/gauguin-sm6350.dtb 2>&1 | tee -a build.log
          ccache -s

      - name: Concatenate Image + dtb manually
        run: |
          BOOT_OUT=kernel/out/arch/arm64/boot
          DTB="$BOOT_OUT/dts/vendor/qcom/gauguin-sm6350.dtb"
          if [ -f "$BOOT_OUT/Image" ] && [ -f "$DTB" ]; then
            cat "$BOOT_OUT/Image" "$DTB" > "$BOOT_OUT/Image-dtb"
            echo "拼接完成"
          else
            echo "警告：Image或dtb缺失，检查上面的build.log"
          fi
          find kernel/out/arch/arm64/boot -maxdepth 3 -type f | sort

      - name: Checkout AnyKernel3 template
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ak3
          rm -rf ak3/ramdisk ak3/patch ak3/.git

      - name: Write anykernel.sh for gauguin/gauguinpro
        run: |
          cat > ak3/anykernel.sh << 'EOF'
          ### AnyKernel3 Ramdisk Mod Script for gauguin/gauguinpro
          ## DtHnAme完整源码编译，不含KernelSU/任何patch

          properties() { '
          kernel.string=gauguin DtHnAme 11.0-oss stock build
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=gauguin
          device.name2=gauguinpro
          device.name3=gauguininpro
          supported.versions=
          supported.patchlevels=
          '; }

          BLOCK=/dev/block/bootdevice/by-name/boot;
          IS_SLOT_DEVICE=1;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;

          . tools/ak3-core.sh;

          dump_boot;
          write_boot;
          EOF
          cat ak3/anykernel.sh

      - name: Stage kernel artifacts into AnyKernel3 zip
        run: |
          BOOT_OUT=kernel/out/arch/arm64/boot
          if [ -f "$BOOT_OUT/Image-dtb" ]; then
            cp "$BOOT_OUT/Image-dtb" ak3/Image
          else
            cp "$BOOT_OUT/Image" ak3/Image
            cp "$BOOT_OUT/dts/vendor/qcom/gauguin-sm6350.dtb" ak3/dtb 2>/dev/null || true
          fi
          ls -la ak3/

      - name: Package AnyKernel3 flashable zip
        run: |
          cd ak3
          zip -r9 ../gauguin-kernel-AK3.zip . -x ".git*"
          cd ..
          ls -la gauguin-kernel-AK3.zip

      - name: Upload AK3 zip + build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gauguin-kernel-AK3
          path: |
            gauguin-kernel-AK3.zip
            kernel/build.log
          if-no-files-found: warn

name: Build Gauguin Kernel (gauguin-q-oss, clean/stock)

# 纯净编译，不集成KernelSU、不打任何patch，先确认这个能编译过、
# 刷进去能正常开机，再考虑后面叠加KSU的事

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bison flex libssl-dev bc libncurses-dev \
            build-essential libelf-dev rsync ccache

      # ccache本身随runner一次性容器消失，靠actions/cache跨run持久化，
      # 不然每次都是空缓存，等于没开。restore-keys保证就算完全没命中
      # 也能捡上一次的缓存当基础，越跑应该越快
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-gauguin-${{ github.run_id }}
          restore-keys: |
            ccache-gauguin-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache --set-config=cache_dir=$HOME/.ccache
          ccache -z

      # Android 10对应分支，已用 git ls-remote 确认存在
      - name: Checkout Xiaomi official kernel source (gauguin-q-oss)
        run: |
          git clone --depth 1 --branch gauguin-q-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel

      # 官方开源包缺了这台设备真正的设备树(arch/arm64/boot/dts/vendor/)和
      # nt36xxx触摸驱动文件夹——defconfig点了名要CONFIG_TOUCHSCREEN_NT36xxx_
      # HOSTDL_SPI=y，但对应的driver目录在官方源码里根本不存在，dtbs也只会
      # 编出apq8016/msm8996这些高通通用参考板，不是gauguin真机。
      # 从Dhollmen那份已验证能正常开机、不会幽灵触控的仓库里，只搬这两块
      # 缺失的内容过来，其余全部保持官方源码不动
      - name: Supplement missing device tree and touch driver from Dhollmen
        run: |
          git clone --depth 1 https://github.com/Dhollmen/Kernel_Xiaomi_Gauguin.git dhollmen-ref
          mkdir -p kernel/arch/arm64/boot/dts/vendor
          cp -r dhollmen-ref/arch/arm64/boot/dts/vendor/* kernel/arch/arm64/boot/dts/vendor/
          cp -r dhollmen-ref/drivers/input/touchscreen/nt36xxx kernel/drivers/input/touchscreen/
          rm -rf dhollmen-ref
          find kernel/arch/arm64/boot/dts/vendor -iname "gauguin*" 
          test -d kernel/drivers/input/touchscreen/nt36xxx && echo "nt36xxx驱动已补上"

      # ZyCromerZ的clang11/gcc4.9都是release附件，不在git仓库内容里，
      # 必须下载release tarball解压，不能直接git clone
      # 换成AOSP官方clang r416183b + 配套gcc4.9（LineageOS镜像，
      # 之前Dhollmen验证过这套组合能用），而不是ZyCromerZ那份
      - name: Download AOSP Clang r416183b toolchain
        run: |
          git clone --depth 1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git toolchain/clang11
          toolchain/clang11/bin/clang --version

      - name: Download matching AOSP GCC 4.9 toolchain
        run: |
          git clone --depth 1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchain/gcc49

      # 官方源码里 scripts/gcc-wrapper.py 是python2语法(print不带括号)，
      # 现代CI镜像已经没有python2了，这里改成python3语法，纯语法转换，
      # 不改变任何编译行为/产物，这是唯一动过的源码文件
      - name: Fix python2 syntax in scripts/gcc-wrapper.py
        run: |
          cd kernel
          sed -i \
            -e 's/print "error, forbidden warning:", m.group(2)/print("error, forbidden warning:", m.group(2))/' \
            -e "s/print line,/print(line, end='')/" \
            -e "s/print args\[0\] + ':',e.strerror/print(args[0] + ':', e.strerror)/" \
            -e "s/print 'Is your PATH set correctly?'/print('Is your PATH set correctly?')/" \
            -e "s/print ' '.join(args), str(e)/print(' '.join(args), str(e))/" \
            -e '1s/python2/python3/' \
            scripts/gcc-wrapper.py

      # 根本修复vdso "unrecognised emulation mode: aarch64linux"：
      # Clang 11+对--prefix=的搜索逻辑变了，只给目录($(GCC_TOOLCHAIN_DIR))
      # 时只会去找裸名的as/ld，找不到就掉回系统PATH，捡到x86_64的系统ld。
      # 把交叉编译前缀拼进prefix里，clang才能找到真正的
      # aarch64-linux-android-as/-ld。这是内核社区确认过的标准修复
      # (Fangrui Song/MaskRay在上游Linux的对应提交)。
      - name: Fix GCC_TOOLCHAIN_DIR prefix for Clang cross compilation
        run: |
          cd kernel
          sed -i 's|CLANG_FLAGS\t+= --prefix=$(GCC_TOOLCHAIN_DIR)$|CLANG_FLAGS\t+= --prefix=$(GCC_TOOLCHAIN_DIR)$(notdir $(CROSS_COMPILE))|' Makefile
          grep -n "prefix=\$(GCC_TOOLCHAIN_DIR)" Makefile

      # 继续往下编译会撞到的第二个坑：modpost给gsi_write_channel_scratch
      # 生成CRC版本符号时，跟lld的重定位处理不兼容，报
      # R_AARCH64_ABS32 cannot be used against symbol ...
      # 官方作法是干脆不给这一个符号生成CRC版本(gauguin/lito平台社区已验证过的修复)。
      # 注意：参考fix原文用的是CRC_PFX宏，但gauguin-q-oss这份modpost.c里
      # 没有这个宏、是直接写死"__crc_"字符串，已经对着真实源码改成匹配写法
      - name: Fix GSI symbol CRC versioning for lld compatibility
        run: |
          cd kernel
          sed -i 's/if (is_crc) {/if (is_crc \&\& strcmp(symname + strlen("__crc_"), "gsi_write_channel_scratch")) {/' scripts/mod/modpost.c
          grep -n "gsi_write_channel_scratch" scripts/mod/modpost.c

      # 第三个坑：clang 12会把某些sprintf(dest,"%s",str)优化成stpcpy调用，
      # 但内核自己的精简字符串库里没实现这个函数，链接时报undefined symbol。
      # 照官方内核后来的正式修复(Nick Desaulniers)把stpcpy补上
      - name: Implement stpcpy for Clang 12 libcall optimization
        run: |
          cd kernel
          python3 - << 'EOF'
          path = "lib/string.c"
          with open(path) as f:
              content = f.read()
          stub = '''char *stpcpy(char *__restrict__ dest, const char *__restrict__ src);
          char *stpcpy(char *__restrict__ dest, const char *__restrict__ src)
          {
          \twhile ((*dest++ = *src++) != '\\0')
          \t\t/* nothing */;
          \treturn --dest;
          }
          EXPORT_SYMBOL(stpcpy);

          '''
          anchor = "#ifndef __HAVE_ARCH_STRCAT"
          assert anchor in content, "anchor not found, need manual check"
          assert "char *stpcpy" not in content, "stpcpy already defined, skip"
          content = content.replace(anchor, stub + anchor, 1)
          with open(path, "w") as f:
              f.write(content)
          print("stpcpy inserted")
          EOF
          grep -n "stpcpy" kernel/lib/string.c 2>/dev/null || grep -n "stpcpy" lib/string.c

      # 完全用官方原版defconfig，不追加任何配置行
      # PATH把工具链目录放在最后，避免裸名的gcc/ld/as被工具链自带的
      # 同名文件顶替，导致host工具(scripts/dtc等)用错链接器
      # HOSTCFLAGS=-fcommon 是关键：老dtc源码里全局变量沿用旧式"暂定定义"
      # 写法，GCC10+/Clang11+默认-fno-common会让这类重复定义直接报错，
      # 显式转回-fcommon是这个问题的标准解法，跟具体编译器版本无关
      # 指定只打包gauguin-sm6350这一个dtb，不然$(dtb-y)兜底逻辑会把
      # apq8016/msm8996/sdm845这些不相关的高通参考板全部一起拼进Image-dtb
      - name: Point dtb selection at gauguin-sm6350 only
        run: |
          cd kernel
          echo 'CONFIG_BUILD_ARM64_APPENDED_DTB_IMAGE_NAMES="gauguin-sm6350"' >> arch/arm64/configs/vendor/gauguin_user_defconfig

      - name: Generate defconfig (stock, untouched)
        run: |
          cd kernel
          export PATH="$PATH:$GITHUB_WORKSPACE/toolchain/clang11/bin:$GITHUB_WORKSPACE/toolchain/gcc49/bin"
          make O=out ARCH=arm64 PYTHON=python3 CC="ccache clang" CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- HOSTCFLAGS=-fcommon gauguin_user_defconfig

      - name: Build kernel (Image + dtb + concatenated Image-dtb)
        run: |
          cd kernel
          export PATH="$PATH:$GITHUB_WORKSPACE/toolchain/clang11/bin:$GITHUB_WORKSPACE/toolchain/gcc49/bin"
          # KCFLAGS=-gdwarf-4：clang默认吐出的调试信息格式，gcc4.9那个年代
          # 配套的老版本as解析不了(.loc文件编号从0开始等新语法)，报
          # "file number less than one"/"junk at end of line"。强制clang
          # 用旧版as能理解的DWARF4格式，这是全局性修复，不是针对某一个文件
          # 显式加上 dtbs Image-dtb 两个target，不管defconfig里
          # CONFIG_BUILD_ARM64_APPENDED_DTB_IMAGE开没开，都保证两种产物都有：
          # 单独的.dtb文件 + kernel内核和dtb拼接好的Image-dtb
          make -j$(nproc) O=out \
            ARCH=arm64 \
            PYTHON=python3 \
            CC="ccache clang" \
            CROSS_COMPILE=aarch64-linux-android- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            HOSTCFLAGS=-fcommon \
            KCFLAGS=-gdwarf-4 \
            dtbs Image-dtb \
            2>&1 | tee build.log
          ccache -s

      - name: List all boot-related build outputs (diagnostic)
        run: |
          find kernel/out/arch/arm64/boot -type f | sort

      # AK3：用官方模板，自己的脚本会去解包当前boot分区、换内核(和dtb)、
      # 重新打包写回去，不用我们自己手动拆boot.img/配对dtb
      - name: Checkout AnyKernel3 template
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ak3
          rm -rf ak3/ramdisk ak3/patch ak3/.git

      - name: Write anykernel.sh for gauguin/gauguinpro
        run: |
          cat > ak3/anykernel.sh << 'EOF'
          ### AnyKernel3 Ramdisk Mod Script for gauguin/gauguinpro
          ## 纯净官方源码编译，不含KernelSU/任何patch

          properties() { '
          kernel.string=gauguin-q-oss stock build
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=gauguin
          device.name2=gauguinpro
          device.name3=gauguininpro
          supported.versions=
          supported.patchlevels=
          '; }

          # BLOCK指向高通设备通用的boot分区by-name路径；虚拟AB设备boot分区
          # 同样带_a/_b后缀，IS_SLOT_DEVICE=1让AK3自动探测当前slot加后缀
          BLOCK=/dev/block/bootdevice/by-name/boot;
          IS_SLOT_DEVICE=1;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;

          . tools/ak3-core.sh;

          dump_boot;
          write_boot;
          EOF
          cat ak3/anykernel.sh

      # 优先用拼好的Image-dtb（内核+设备树已经在编译时拼在一起了，
      # AK3直接当kernel整体处理）；如果因为某些defconfig组合没生成，
      # 就退回单独的Image+dtb两个文件一起放，AK3自己会识别dtb文件名拼上
      - name: Stage kernel artifacts into AnyKernel3 zip
        run: |
          BOOT_OUT=kernel/out/arch/arm64/boot
          if [ -f "$BOOT_OUT/Image-dtb" ]; then
            echo "使用拼接好的 Image-dtb"
            cp "$BOOT_OUT/Image-dtb" ak3/Image
          else
            echo "没有Image-dtb，退回单独Image+dtb"
            cp "$BOOT_OUT/Image" ak3/Image
            DTB=$(find "$BOOT_OUT/dts" -name "gauguin*.dtb" | head -1)
            if [ -n "$DTB" ]; then
              cp "$DTB" ak3/dtb
            else
              echo "警告：连单独的dtb都没找到，检查上一步的文件列表输出"
            fi
          fi
          ls -la ak3/

      - name: Package AnyKernel3 flashable zip
        run: |
          cd ak3
          zip -r9 ../gauguin-kernel-AK3.zip . -x ".git*"
          cd ..
          ls -la gauguin-kernel-AK3.zip

      - name: Upload AK3 zip + build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gauguin-kernel-AK3
          path: |
            gauguin-kernel-AK3.zip
            kernel/build.log
          if-no-files-found: warn

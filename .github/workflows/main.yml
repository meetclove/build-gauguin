name: Build Gauguin 4.19 KSU
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Configuration
        run: |
          echo "KERNEL_DEFCONFIG=vendor/gauguin_defconfig" >> $GITHUB_ENV

      - name: Setup build kernel environment
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d%H%M")" >> $GITHUB_ENV
          sudo apt-get update
          sudo apt-get install git flex lzop bison make libssl-dev python3 python-is-python3 libncurses-dev

      - name: Download Toolchains
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
          wget https://github.com/ZyCromerZ/Clang/releases/download/11.1.0-20220724-release/Clang-11.1.0-20220724.tar.gz
          mkdir clang
          cd clang
          tar -zvxf ../Clang-11.1.0-20220724.tar.gz

      - name: Checkout Kernel Source
        run: |
          git clone --depth=1 https://github.com/meetclove/kernel_xiaomi_gauguin project
          rm -rf project/drivers/kernelsu

      - name: Setup Patches
        run: |
          cd project
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "CONFIG_KSU_SUSFS=n"
            echo "CONFIG_KALLSYMS=y"
            echo "CONFIG_KALLSYMS_ALL=y"
          } >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
          git apply ../ksu_hooks_sukisu_4.19.patch

      - name: Setup SukiSU-Ultra
        run: |
          cd project
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

          # 回档到 2026-04-30 前的最后稳定提交
          # builtin 分支 5 月后的新提交引入了 4.19 不兼容变更
          LAST_GOOD=$(cd KernelSU && git log --format="%H" --before="2026-04-18T00:00:00" | head -1)
          if [ -n "$LAST_GOOD" ]; then
            cd KernelSU && git checkout "$LAST_GOOD" && cd ..
            echo "[KSU] 已回档: $(cd KernelSU && git log -1 --format='%h %ci')"
          fi

          git config --global user.email "bot@example.com"
          git config --global user.name "bot"
          git add .
          git commit -m ksu

      - name: Build kernel
        run: |
          cd project
          export PATH=$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64

          # KSU_VERSION=13377 写死版本号，与 SukiSU v3.2.0 (13377) APK 精确匹配
          # KernelSU Makefile 优先使用此变量，不再从 git commit 计数
          make O=out ARCH=arm64 SUBARCH=arm64 CC=clang HOSTCC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 \
            KSU_VERSION=13377 \
            ${{ env.KERNEL_DEFCONFIG }}

          make -j$(nproc) O=out ARCH=arm64 SUBARCH=arm64 CC=clang HOSTCC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 \
            KSU_VERSION=13377

      - name: Upload the kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: Gauguin_4.19_SukiSU_13377_${{ env.BUILD_TIME}}
          path: |
            project/out/arch/arm64/boot/*

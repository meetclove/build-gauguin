name: Gauguin Kernel Build (Android 10)

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch'
        required: true
        default: 'gauguin-q-oss'
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ARCH: arm64
      SUBARCH: arm64
      CROSS_COMPILE: aarch64-linux-android-
      KERNEL_DEFCONFIG: gauguin_defconfig
      KERNEL_DIR: ${{ github.workspace }}/kernel
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Display System Info
        run: |
          echo "=== System Information ==="
          uname -a
          nproc
          free -h
          echo "=========================="

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc \
            bison \
            flex \
            libc6-dev \
            libncurses5-dev \
            libssl-dev \
            libelf-dev \
            gcc \
            g++ \
            make \
            git \
            wget \
            curl \
            python3 \
            ccache
          
          echo "=== Installed Tools ==="
          gcc --version
          make --version

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: gauguin-kernel
          max-size: 2G

      - name: Download Android Toolchain (aarch64-linux-android)
        run: |
          echo "Downloading aarch64-linux-android toolchain..."
          mkdir -p ${{ github.workspace }}/toolchain
          cd ${{ github.workspace }}/toolchain
          
          # 方式 1: 使用 Adrilaw 的预编译工具链（推荐）
          echo "Trying Adrilaw prebuilt toolchain..."
          if git clone --depth=1 https://github.com/Adrilaw/aarch64-linux-android-4.9-toolchain.git aarch64-linux-android 2>/dev/null; then
            echo "✓ Adrilaw toolchain cloned successfully"
          else
            # 方式 2: 使用 JonasCardoso 的工具链
            echo "Trying JonasCardoso toolchain..."
            git clone --depth=1 https://github.com/JonasCardoso/Toolchain.git
            cp -r Toolchain/aarch64-linux-android-4.9 aarch64-linux-android
          fi
          
          # 检查工具链
          if [ ! -d "aarch64-linux-android/bin" ]; then
            echo "✗ bin directory not found, checking structure..."
            find . -name "aarch64-linux-android-gcc" -type f 2>/dev/null | head -5
            
            # 尝试查找 gcc 在根目录
            if find aarch64-linux-android -name "aarch64-linux-android-gcc" -type f 2>/dev/null | grep -q .; then
              TOOLCHAIN_BIN=$(find aarch64-linux-android -name "aarch64-linux-android-gcc" -type f | head -1 | xargs dirname)
              echo "Found GCC at: $TOOLCHAIN_BIN"
            else
              echo "✗ aarch64-linux-android-gcc not found!"
              ls -la aarch64-linux-android/
              exit 1
            fi
          else
            TOOLCHAIN_BIN="${{ github.workspace }}/toolchain/aarch64-linux-android/bin"
          fi
          
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH
          
          echo "=== Toolchain Setup Complete ==="
          which aarch64-linux-android-gcc || echo "GCC not in PATH yet"
          $TOOLCHAIN_BIN/aarch64-linux-android-gcc --version

      - name: Clone Kernel Source
        run: |
          echo "Cloning gauguin kernel source..."
          git clone --depth=1 \
            -b ${{ github.event.inputs.kernel_branch || 'gauguin-q-oss' }} \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            ${{ env.KERNEL_DIR }}
          
          cd ${{ env.KERNEL_DIR }}
          echo "Kernel source cloned successfully"
          git log --oneline -5

      - name: Verify Kernel Config
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "=== Searching for available defconfigs ==="
          find arch/arm64/configs/ -type f -name "*" | grep -i gauguin || echo "No gauguin config found, listing first 20 configs:"
          ls -1 arch/arm64/configs/ | head -20

      - name: Configure Kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export PATH="/usr/lib/ccache:$PATH"
          
          echo "Configuring with ${{ env.KERNEL_DEFCONFIG }}..."
          make O=out ${{ env.KERNEL_DEFCONFIG }} || {
            echo "✗ Failed to configure with ${{ env.KERNEL_DEFCONFIG }}"
            echo "Available configs:"
            ls arch/arm64/configs/
            exit 1
          }
          
          echo "=== Kernel Config Generated ==="
          ls -lh out/.config

      - name: Build Kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export PATH="/usr/lib/ccache:$PATH"
          
          echo "Starting kernel build with $(nproc) CPU cores..."
          echo "Build start time: $(date)"
          
          make -j$(nproc) O=out 2>&1 | tee build.log
          BUILD_RESULT=$?
          
          echo ""
          echo "Build completed at: $(date)"
          
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "✗ Build failed with exit code: $BUILD_RESULT"
            echo "=== Last 200 lines of build log ==="
            tail -200 build.log
            exit $BUILD_RESULT
          else
            echo "✓ Build succeeded!"
            tail -50 build.log
          fi

      - name: Check Build Output
        if: success()
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "=== Build Artifacts ==="
          ls -lh out/arch/arm64/boot/ || echo "boot directory not found"
          
          # 查找所有可能的内核镜像
          find out/ -name "Image*" -type f 2>/dev/null || echo "No Image files found"

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gauguin-kernel-image
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: ${{ env.KERNEL_DIR }}/build.log
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "==============================="
          echo "=== Build Summary ==="
          echo "Build Status: ${{ job.status }}"
          echo "Kernel Branch: ${{ github.event.inputs.kernel_branch || 'gauguin-q-oss' }}"
          echo "Architecture: ${{ env.ARCH }}"
          echo "Defconfig: ${{ env.KERNEL_DEFCONFIG }}"
          echo "Toolchain: aarch64-linux-android"
          echo "GitHub Actions Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "==============================="

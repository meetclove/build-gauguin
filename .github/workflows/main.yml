name: Gauguin Kernel Build (Android 10)

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch'
        required: true
        default: 'gauguin-q-oss'
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ARCH: arm64
      SUBARCH: arm64
      CROSS_COMPILE: aarch64-linux-android-
      KERNEL_DEFCONFIG: gauguin_defconfig
      KERNEL_DIR: ${{ github.workspace }}/kernel
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Display System Info
        run: |
          echo "=== System Information ==="
          uname -a
          nproc
          free -h
          echo "=========================="

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc \
            bison \
            flex \
            libc6-dev \
            libncurses5-dev \
            libssl-dev \
            libelf-dev \
            gcc \
            g++ \
            make \
            git \
            wget \
            curl \
            python3 \
            ccache
          
          echo "=== Installed Tools ==="
          gcc --version
          make --version
          bison --version
          flex --version

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: gauguin-kernel
          max-size: 2G

      - name: Download Android Toolchain (aarch64-linux-android)
        run: |
          echo "Downloading aarch64-linux-android toolchain..."
          mkdir -p ${{ github.workspace }}/toolchain
          cd ${{ github.workspace }}/toolchain
          
          # 使用 KudProject 的正确预编译工具链
          echo "Cloning from KudProject..."
          git clone --depth=1 https://github.com/KudProject/aarch64-linux-android.git aarch64-linux-android
          
          # 检查工具链是否存在
          if [ ! -d "aarch64-linux-android/bin" ]; then
            echo "Error: Toolchain bin directory not found!"
            echo "Available directories:"
            ls -la aarch64-linux-android/
            exit 1
          fi
          
          echo "${{ github.workspace }}/toolchain/aarch64-linux-android/bin" >> $GITHUB_PATH
          
          echo "=== Toolchain Setup Complete ==="
          which aarch64-linux-android-gcc
          aarch64-linux-android-gcc --version

      - name: Clone Kernel Source
        run: |
          echo "Cloning gauguin kernel source..."
          git clone --depth=1 \
            -b ${{ github.event.inputs.kernel_branch || 'gauguin-q-oss' }} \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            ${{ env.KERNEL_DIR }}
          
          cd ${{ env.KERNEL_DIR }}
          echo "Kernel source cloned successfully"
          git log --oneline -5

      - name: Verify Kernel Config
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "=== Searching for defconfig files ==="
          find arch/arm64/configs/ -name "*gauguin*" -o -name "*gauguinpro*" 2>/dev/null || true
          echo ""
          echo "=== All available configs ==="
          ls -1 arch/arm64/configs/ | head -20

      - name: Configure Kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export PATH="/usr/lib/ccache:$PATH"
          
          echo "Configuring with ${{ env.KERNEL_DEFCONFIG }}..."
          make O=out ${{ env.KERNEL_DEFCONFIG }}
          
          echo "=== Kernel Config Generated ==="
          ls -lh out/.config
          echo "Config file contents (first 30 lines):"
          head -30 out/.config

      - name: Build Kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export PATH="/usr/lib/ccache:$PATH"
          
          echo "Starting kernel build with $(nproc) CPU cores..."
          echo "Build start time: $(date)"
          
          make -j$(nproc) O=out 2>&1 | tee build.log
          
          echo ""
          echo "Build completed at: $(date)"
          echo "=== Last 100 lines of build log ==="
          tail -100 build.log

      - name: Check Build Output
        if: success()
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "=== Build Artifacts ==="
          ls -lh out/arch/arm64/boot/
          
          # 检查关键文件
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "✓ Kernel Image found"
            file out/arch/arm64/boot/Image
            ls -lh out/arch/arm64/boot/Image
          else
            echo "✗ Kernel Image NOT found - build may have failed"
            exit 1
          fi
          
          if [ -f out/arch/arm64/boot/Image.gz ]; then
            echo "✓ Kernel Image.gz found"
            file out/arch/arm64/boot/Image.gz
            ls -lh out/arch/arm64/boot/Image.gz
          fi

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gauguin-kernel-image
          path: ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image*
          retention-days: 30

      - name: Upload DTB Files (if exists)
        if: success()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: gauguin-kernel-dtb
          path: ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dts/
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: ${{ env.KERNEL_DIR }}/build.log
          retention-days: 7

      - name: Create Release (on Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz
          body: |
            Gauguin Kernel Build
            Branch: ${{ github.event.inputs.kernel_branch || 'gauguin-q-oss' }}
            Commit: ${{ github.sha }}
            Build Time: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "==============================="
          echo "=== Build Summary ==="
          echo "Build Status: ${{ job.status }}"
          echo "Kernel Branch: ${{ github.event.inputs.kernel_branch || 'gauguin-q-oss' }}"
          echo "Architecture: ${{ env.ARCH }}"
          echo "Defconfig: ${{ env.KERNEL_DEFCONFIG }}"
          echo "Toolchain: aarch64-linux-android (from KudProject)"
          echo "GitHub Actions Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "==============================="
